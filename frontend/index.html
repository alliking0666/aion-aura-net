<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AION AURA NET</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="logo">💜</div>
      <h1>AION AURA NET</h1>
      <p id="welcomeText">Loading...</p>

      <div class="modes">
        <button id="videoBtn" type="button">🎥 Video Roulette</button>
        <button id="voiceBtn" type="button">🎙 Voice Roulette</button>
        <button id="textBtn" type="button" class="active">💬 Text Roulette</button>
      </div>

      <button id="startBtn" type="button" class="start">🚀 Start Random Session</button>
      <p id="status"></p>
    </section>
  </main>

  <script>
    const API_URL = "https://aion-aura-net.onrender.com";
    let selectedMode = "text";

    const welcomeText = document.getElementById("welcomeText");
    const statusEl = document.getElementById("status");

    const buttons = {
      video: document.getElementById("videoBtn"),
      voice: document.getElementById("voiceBtn"),
      text: document.getElementById("textBtn")
    };

    function setActive(mode) {
      selectedMode = mode;

      Object.values(buttons).forEach((button) => {
        button.classList.remove("active");
      });

      buttons[mode].classList.add("active");
      statusEl.innerText = "Selected mode: " + mode;
    }

    buttons.video.addEventListener("click", () => setActive("video"));
    buttons.voice.addEventListener("click", () => setActive("voice"));
    buttons.text.addEventListener("click", () => setActive("text"));

    async function loadWelcome() {
      try {
        const response = await fetch(API_URL + "/api/welcome");
        const data = await response.json();
        welcomeText.innerText = data.message || "Welcome to AION AURA NET";
      } catch (error) {
        welcomeText.innerText = "Backend connection error";
        console.error(error);
      }
    }

    loadWelcome();

    const socket = io(API_URL, {
      transports: ["websocket", "polling"]
    });

    socket.on("connect", () => {
      statusEl.innerText = "Connected. Choose mode and start.";
    });

    socket.on("connect_error", (error) => {
      statusEl.innerText = "Socket connection error";
      console.error(error);
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      statusEl.innerText = "Searching for random partner...";

      socket.emit("join_queue", {
        mode: selectedMode
      });
    });

    socket.on("searching", (data) => {
      statusEl.innerText = data.message || "Searching for random partner...";
    });

    socket.on("partner_found", (data) => {
      statusEl.innerText = "✅ Partner found in " + data.mode + " mode";
    });

    socket.on("partner_disconnected", () => {
      statusEl.innerText = "❌ Partner disconnected";
    });
  </script>
</body>
</html>
